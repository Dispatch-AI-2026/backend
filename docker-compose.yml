version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.local
    ports:
      - "4000:4000"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mongo-data:
