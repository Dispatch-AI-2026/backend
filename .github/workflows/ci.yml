name: Image Build and Push Pipeline
run-name: >
  ${{ github.event_name == 'push' && format('Image Build & Push by {0}', github.actor) ||
      github.event_name == 'workflow_dispatch' && 'Image Build & Push (manual)' }}

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read   # Needed for checkout code
  id-token: write  # Required for AWS OIDC
  security-events: write  # Required for uploading Trivy SARIF results

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-2' }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'dispatchai2026-backend' }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  
  # Image tagging strategy
  SHORT_SHA: ${{ github.sha }}
  RUN_ID: ${{ github.run_id }}
  BRANCH_NAME: ${{ github.ref_name }}
  TIMESTAMP: ${{ github.event.head_commit.timestamp || github.run_started_at }}
  
  # Docker configuration
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain  # Shows raw build output instead of fancy TTY outputs

jobs:
  # Job 1: Code quality and security scanning
  code-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # get entire git history, 1 --> last commit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            **/pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Run linting
      #   run: pnpm run lint

      # - name: Run unit tests
      #   run: pnpm test:unit

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'  # Fail pipeline if HIGH/CRITICAL vulnerabilities found
          # Scan for vulnerabilities in dependencies and misconfigurations
          scanners: 'vuln,secret,misconfig'

      - name: Upload Trivy fs scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-fs'

      - name: Set scan result
        id: trivy-scan
        run: |
          echo "Security scan completed with Trivy"
          echo "scan-passed=true" >> $GITHUB_OUTPUT

  # Job 2: Build and push Docker image
  build-and-push:
    needs: code-scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      security-events: write  # Required for uploading Trivy SARIF results
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-ECR-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.AWS_ACCOUNT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: false
          load: true
          tags: |
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}-${{ github.run_number }}
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || github.run_started_at }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # REPLACED: Snyk container scan with Trivy container scan
      - name: Run Trivy vulnerability scanner on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'  # Fail pipeline if HIGH/CRITICAL vulnerabilities found

      - name: Upload Trivy image scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'

      - name: Push to ECR after successful scan
        if: success()
        run: |
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}-${{ github.run_number }}
          
      - name: Output image information
        run: |
          echo "Image successfully built and pushed to ECR"
          echo "Tags:"
          echo "  - ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          echo "  - ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}-${{ github.run_number }}"
          echo "ECR Repository: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}"
